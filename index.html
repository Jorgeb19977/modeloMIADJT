<!DOCTYPE html>
<html>

<head>

<title>Modelo recomendación vivienda Bogotá</title>

<!-- Estilo del mapa Leaflet -->
<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

</head>

<body>

<h2>Modelo recomendación vivienda Bogotá</h2>

<div id="variables"></div>

<!--Eco-->

<div id="seccion-economica">
    <h3>Datos Financieros</h3>
    <label>Ingresos Mensuales:</label>
    <input type="number" id="ingresos" value="0"><br>
    <label>Ahorros Totales:</label>
    <input type="number" id="ahorros" value="0"><br>
    <label>Gastos Mensuales:</label>
    <input type="number" id="gastos" value="0"><br>
</div>


<br>

<button onclick="calcular()">Calcular cluster recomendado</button>

<h3 id="resultado"></h3>


<h2>Mapa de recomendaciones</h2>

<div id="map" style="height:500px;"></div>


<!-- Librería Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Tu script principal -->
<script src="script.js"></script>


<style>

.legend {
background: white;
padding: 8px;
border-radius: 6px;
font-size: 12px;
line-height: 18px;
box-shadow: 0 0 6px rgba(0,0,0,0.3);
}

.legend i {
width: 14px;
height: 14px;
float: left;
margin-right: 6px;
opacity: 0.8;
}

</style>

</html>
