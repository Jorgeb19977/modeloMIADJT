<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Modelo recomendación vivienda Bogotá</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #variables { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .map-container { height: 500px; width: 100%; margin-bottom: 30px; border: 1px solid #ccc; }
        .legend { background: white; padding: 10px; border: 1px solid #ccc; line-height: 1.5em; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }

        /* --- --- */
        tr.fila-cluster { cursor: pointer; transition: background 0.3s; }
        tr.fila-cluster:hover { background-color: #f0f8ff !important; }
        /* ------------------------ */
    </style>
</head>
<body>

    <h2>1. Configuración de Preferencias</h2>
    <div id="variables"></div>

    <h2>2. Datos Financieros</h2>
    <div id="seccion-economica">
        <label>Ingresos Mensuales: <input type="number" id="ingresos" value="0"></label><br>
        <label>Ahorros Totales: <input type="number" id="ahorros" value="0"></label><br>
        <label>Gastos Mensuales: <input type="number" id="gastos" value="0"></label><br>
    </div>

    <br>
    <button onclick="calcular()" style="padding: 10px 20px; cursor: pointer;">CALCULAR RECOMENDACIÓN</button>
    
    <p id="resultado" style="font-weight: bold; color: blue;"></p>

    <hr>

    <h2>Mapa 1: Todas las Viviendas (Score por Variables)</h2>
    <div id="map" class="map-container"></div>

    <h2>Mapa 2: Top 10 Clusters más afines</h2>
    <div id="map2" class="map-container"></div>

    <h3>Top 10 Clusters más afines</h3>
    <div id="tabla-clusters"></div>

    <h3>Top 5 Viviendas recomendadas (Mejor Cluster)</h3>
    <div id="tabla-viviendas"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
